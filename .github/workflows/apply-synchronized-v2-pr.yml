name: Apply synchronized play-along upgrade from PR

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: apply-synchronized-play-along-v2-pr
  cancel-in-progress: false

jobs:
  apply-validate-and-benchmark:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'agent/synchronized-play-along-v2'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PYTHONUNBUFFERED: "1"
      OPENBLAS_NUM_THREADS: "1"
      OMP_NUM_THREADS: "1"
    steps:
      - name: Check out upgrade branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Reconstruct the locally tested source tree
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r script; do
            echo "Applying ${script}"
            python "${script}"
          done < <(find .bootstrap-v2 -maxdepth 1 -type f -name 'part-*.py' | sort)

      - name: Verify every reconstructed source file
        shell: bash
        run: |
          set -o pipefail
          sha256sum -c .bootstrap-v2/expected-sha256.txt | tee /tmp/reconstruction-check.txt

      - name: Remove superseded and temporary files
        shell: bash
        run: |
          set -euo pipefail
          rm -f scripts/benchmark_public_domain.py scripts/__init__.py
          rm -f benchmarks/results.md benchmarks/results.json
          rm -rf benchmarks/timelines
          rm -rf .bootstrap .bootstrap-v2
          rm -f .github/workflows/apply-synchronized-v2.yml
          rm -f .github/workflows/apply-synchronized-v2-pr.yml

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.29"
          python-version: "3.12"
          enable-cache: true

      - name: Sync the committed lockfile
        run: uv sync --locked

      - name: Lint
        shell: bash
        run: |
          set -o pipefail
          uv run --frozen ruff check . 2>&1 | tee /tmp/ruff.log

      - name: Run automated tests
        shell: bash
        run: |
          set -o pipefail
          uv run --frozen pytest -vv 2>&1 | tee /tmp/pytest.log

      - name: Remove the Gradio-generated typing stub
        run: rm -f src/sgchords/ui.pyi

      - name: Build wheel and source distribution
        shell: bash
        run: |
          set -o pipefail
          uv build 2>&1 | tee /tmp/build.log

      - name: Analyze five known-chord recordings
        shell: bash
        run: |
          set -o pipefail
          uv run --frozen python scripts/benchmark_known_chords.py \
            --output /tmp/benchmark-results 2>&1 | tee /tmp/benchmark.log

      - name: Store checked benchmark results
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p benchmarks/timelines
          cp /tmp/benchmark-results/results.md benchmarks/results.md
          cp /tmp/benchmark-results/results.json benchmarks/results.json
          cp /tmp/benchmark-results/timelines/*.csv benchmarks/timelines/

      - name: Upload validation and benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synchronized-play-along-validation
          path: |
            /tmp/reconstruction-check.txt
            /tmp/ruff.log
            /tmp/pytest.log
            /tmp/build.log
            /tmp/benchmark.log
            /tmp/benchmark-results
          if-no-files-found: warn

      - name: Commit the validated upgrade and measured results
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Build synchronized play-along experience"
          git push origin "HEAD:${{ github.head_ref }}"
