name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.29"
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Resolve and sync
        shell: bash
        run: |
          set +e
          uv --version 2>&1 | tee uv-debug.log
          uv lock 2>&1 | tee -a uv-debug.log
          lock_status=${PIPESTATUS[0]}
          if [ "$lock_status" -eq 0 ]; then
            uv sync --locked 2>&1 | tee -a uv-debug.log
            sync_status=${PIPESTATUS[0]}
          else
            sync_status=0
          fi
          exit $((lock_status || sync_status))
      - name: Save resolver diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uv-debug-${{ matrix.python-version }}
          path: uv-debug.log
          if-no-files-found: error
      - name: Lint
        run: uv run --frozen ruff check .
      - name: Test
        run: uv run --frozen pytest
      - name: Build
        run: uv build
      - name: Save generated lockfile
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: uv-lock
          path: uv.lock
          if-no-files-found: error

  public-domain-benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.29"
          python-version: "3.12"
          enable-cache: true
      - name: Resolve and sync
        shell: bash
        run: |
          set +e
          uv --version 2>&1 | tee uv-benchmark-debug.log
          uv lock 2>&1 | tee -a uv-benchmark-debug.log
          lock_status=${PIPESTATUS[0]}
          if [ "$lock_status" -eq 0 ]; then
            uv sync --locked 2>&1 | tee -a uv-benchmark-debug.log
            sync_status=${PIPESTATUS[0]}
          else
            sync_status=0
          fi
          exit $((lock_status || sync_status))
      - name: Save benchmark resolver diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uv-benchmark-debug
          path: uv-benchmark-debug.log
          if-no-files-found: error
      - name: Analyze public-domain songs
        run: uv run --frozen python scripts/benchmark_public_domain.py --output benchmark-results
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: public-domain-song-results
          path: benchmark-results
          if-no-files-found: error
