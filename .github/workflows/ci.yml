name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.29"
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Sync locked environment
        run: uv sync --locked
      - name: Lint
        run: uv run --frozen ruff check .
      - name: Test
        run: uv run --frozen pytest
      - name: Remove generated Gradio stub
        run: rm -f src/sgchords/ui.pyi
      - name: Build
        run: uv build

  known-chord-benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.29"
          python-version: "3.12"
          enable-cache: true
      - name: Sync locked environment
        run: uv sync --locked
      - name: Analyze known-chord recordings
        run: >-
          uv run --frozen python scripts/benchmark_known_chords.py
          --output benchmark-results
          --minimum-exact-sequence-recall 0.90
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: known-chord-benchmark-results
          path: benchmark-results
          if-no-files-found: error
