name: Finalize uv migration

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: finalize-uv-migration
  cancel-in-progress: false

jobs:
  finalize:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'agent/uv-song-benchmarks'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.29"
          python-version: "3.12"
          enable-cache: true
      - name: Apply final source and CI fixes
        run: |
          python scripts/apply_final_fixes.py
          python - <<'PY'
          from pathlib import Path

          Path("tests/test_benchmark.py").write_text(
              '''from __future__ import annotations

          import importlib.util
          import sys
          from pathlib import Path

          SCRIPT_PATH = (
              Path(__file__).resolve().parents[1]
              / "scripts"
              / "benchmark_public_domain.py"
          )
          SPEC = importlib.util.spec_from_file_location(
              "sgchords_benchmark_script",
              SCRIPT_PATH,
          )
          assert SPEC is not None and SPEC.loader is not None
          MODULE = importlib.util.module_from_spec(SPEC)
          sys.modules[SPEC.name] = MODULE
          SPEC.loader.exec_module(MODULE)

          align_reference_chords = MODULE.align_reference_chords


          def test_reference_alignment_handles_capo_or_global_transposition() -> None:
              result = align_reference_chords(
                  ["C", "G", "Am", "F"],
                  ["D", "A", "Bm", "G"],
              )
              assert result["literal_coverage"] == 0.25
              assert result["best_shift"] == 2
              assert result["aligned_expected"] == ["D", "A", "Bm", "G"]
              assert result["aligned_coverage"] == 1.0
              assert result["missing"] == []
              assert result["extra"] == []
          ''',
              encoding="utf-8",
          )
          PY
          rm -f scripts/apply_final_fixes.py
          rm -f scripts/__init__.py
          rm -f .github/workflows/finalize-uv.yml
          rm -f .github/workflows/commit-uv-lock.yml
      - name: Validate locked project
        shell: bash
        run: |
          set +e
          uv sync --locked 2>&1 | tee final-validation.log
          sync_status=${PIPESTATUS[0]}
          if [ "$sync_status" -eq 0 ]; then
            uv run --frozen ruff check . 2>&1 | tee -a final-validation.log
            lint_status=${PIPESTATUS[0]}
          else
            lint_status=0
          fi
          if [ "$sync_status" -eq 0 ] && [ "$lint_status" -eq 0 ]; then
            uv run --frozen pytest 2>&1 | tee -a final-validation.log
            test_status=${PIPESTATUS[0]}
          else
            test_status=0
          fi
          if [ "$sync_status" -eq 0 ] && [ "$lint_status" -eq 0 ] && [ "$test_status" -eq 0 ]; then
            uv build 2>&1 | tee -a final-validation.log
            build_status=${PIPESTATUS[0]}
          else
            build_status=0
          fi
          exit $((sync_status || lint_status || test_status || build_status))
      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-validation-log
          path: final-validation.log
          if-no-files-found: error
      - name: Run real-song benchmark
        run: uv run --frozen python scripts/benchmark_public_domain.py --output benchmark-results
      - name: Store checked benchmark results
        run: |
          mkdir -p benchmarks/timelines
          cp benchmark-results/results.md benchmarks/results.md
          cp benchmark-results/results.json benchmarks/results.json
          cp benchmark-results/*-timeline.csv benchmarks/timelines/
      - name: Commit validated changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize uv workflow and song benchmarks"
          git push origin "HEAD:${{ github.head_ref }}"
